<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <!-- Background decorative circles -->
  <circle cx="400" cy="50" r="80" fill="rgba(255,255,255,0.08)"/>
  <circle cx="80" cy="350" r="60" fill="rgba(255,255,255,0.06)"/>
  <circle cx="450" cy="320" r="40" fill="rgba(255,255,255,0.05)"/>

  <!-- Phone / Device -->
  <rect x="175" y="60" width="150" height="270" rx="20" fill="white" opacity="0.95"/>
  <rect x="175" y="60" width="150" height="270" rx="20" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Screen -->
  <rect x="185" y="80" width="130" height="230" rx="12" fill="#f0f4ff"/>
  <!-- Notch -->
  <rect x="225" y="66" width="50" height="6" rx="3" fill="#e2e8f0"/>

  <!-- App Header -->
  <rect x="195" y="92" width="110" height="28" rx="8" fill="#4f46e5"/>
  <text x="250" y="111" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="white">Pedami Payment</text>

  <!-- Water bill card -->
  <rect x="195" y="130" width="110" height="50" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="213" cy="148" r="10" fill="#dbeafe"/>
  <text x="213" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3b82f6">💧</text>
  <text x="230" y="147" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#334155">PDAM</text>
  <text x="230" y="158" font-family="system-ui, sans-serif" font-size="7" fill="#94a3b8">Rp 125.000</text>
  <rect x="270" y="142" width="28" height="16" rx="4" fill="#dcfce7"/>
  <text x="284" y="153" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6" font-weight="700" fill="#16a34a">LUNAS</text>

  <!-- Electric bill card -->
  <rect x="195" y="190" width="110" height="50" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="213" cy="208" r="10" fill="#fef9c3"/>
  <text x="213" y="212" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#eab308">⚡</text>
  <text x="230" y="207" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#334155">PLN</text>
  <text x="230" y="218" font-family="system-ui, sans-serif" font-size="7" fill="#94a3b8">Rp 280.500</text>
  <rect x="270" y="202" width="28" height="16" rx="4" fill="#dcfce7"/>
  <text x="284" y="213" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6" font-weight="700" fill="#16a34a">LUNAS</text>

  <!-- Bottom nav -->
  <rect x="195" y="260" width="110" height="38" rx="8" fill="white"/>
  <circle cx="220" cy="279" r="8" fill="#eef2ff"/>
  <text x="220" y="283" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4f46e5">🏠</text>
  <circle cx="250" cy="279" r="8" fill="#eef2ff"/>
  <text x="250" y="283" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4f46e5">💳</text>
  <circle cx="280" cy="279" r="8" fill="#eef2ff"/>
  <text x="280" y="283" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4f46e5">📊</text>

  <!-- Floating cards -->
  <!-- Success checkmark -->
  <g transform="translate(340, 100)">
    <rect width="90" height="70" rx="12" fill="white" opacity="0.95" filter="url(#shadow)"/>
    <circle cx="45" cy="28" r="14" fill="#dcfce7"/>
    <path d="M38 28 L43 33 L52 23" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="45" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#334155">Pembayaran</text>
    <text x="45" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#16a34a">Berhasil!</text>
  </g>

  <!-- Wallet card -->
  <g transform="translate(70, 120)">
    <rect width="85" height="65" rx="12" fill="white" opacity="0.95" filter="url(#shadow)"/>
    <circle cx="42" cy="25" r="12" fill="#eef2ff"/>
    <text x="42" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#4f46e5">👛</text>
    <text x="42" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#94a3b8">Saldo Loket</text>
    <text x="42" y="57" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#334155">Rp 2.5 Jt</text>
  </g>

  <!-- Coin stack -->
  <g transform="translate(92, 250)">
    <ellipse cx="20" cy="30" rx="20" ry="6" fill="#fbbf24" opacity="0.6"/>
    <ellipse cx="20" cy="24" rx="20" ry="6" fill="#fbbf24" opacity="0.7"/>
    <ellipse cx="20" cy="18" rx="20" ry="6" fill="#fbbf24" opacity="0.8"/>
    <ellipse cx="20" cy="12" rx="20" ry="6" fill="#fbbf24" opacity="0.9"/>
    <ellipse cx="20" cy="6" rx="20" ry="6" fill="#fbbf24"/>
    <text x="20" y="10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="white">Rp</text>
  </g>

  <!-- Arrow / connection lines -->
  <path d="M155 155 C165 155, 170 155, 185 145" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
  <path d="M345 175 C335 180, 330 185, 315 190" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>

  <!-- Shadow filter -->
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.1)"/>
    </filter>
  </defs>
</svg>
